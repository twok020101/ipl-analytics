services:
  db:
    image: postgres:16-alpine
    container_name: ipl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ipl
      POSTGRES_PASSWORD: ipl_dev_password
      POSTGRES_DB: ipl_analytics
    ports:
      - "5432:5432"
    volumes:
      - ipl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipl -d ipl_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ipl_pgdata:
